<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automatismes 3ème - Entraînement</title>
    <style>
        :root {
            --bg-color: #0b0b0c;
            --card-bg: #16161a;
            --accent-color: #39ff14; /* Vert McKinsey */
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --border-color: #2c2c2e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            max-width: 650px;
            width: 100%;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .header {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 25px;
            text-align: center;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 800;
            margin: 0 0 5px 0;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            color: var(--text-main);
        }

        .header .subtitle {
            font-size: 13px;
            color: var(--text-muted);
        }

        .step-panel {
            display: none;
        }

        .step-panel.active {
            display: block;
        }

        label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        input[type="text"] {
            width: 100%;
            background-color: #222227;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 14px;
            color: var(--text-main);
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            margin-bottom: 15px;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
        }

        .consigne {
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 20px;
            color: var(--text-main);
        }
        
        .question-box {
            background-color: #1e1e24;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 25px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Style propre pour l'écriture des fractions verticales réelles */
        .math-fraction {
            display: inline-flex;
            flex-direction: column;
            vertical-align: middle;
            text-align: center;
            padding: 0 6px;
            font-size: 22px;
        }
        .math-num {
            display: block;
            border-bottom: 2px solid var(--text-main);
            padding-bottom: 2px;
        }
        .math-den {
            display: block;
            padding-top: 2px;
        }

        /* Conteneur pour aligner texte et fractions sur une ligne */
        .math-line {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            flex-wrap: wrap;
        }

        /* Styles pour les choix QCM (formules) */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .option-button {
            background-color: #222227;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            text-align: left;
            transition: background-color 0.2s, border-color 0.2s;
            display: flex;
            align-items: center;
        }

        .option-button:hover {
            border-color: var(--accent-color);
            background-color: #2a2a30;
        }

        .option-button.selected {
            border-color: var(--accent-color);
            background-color: rgba(57, 255, 20, 0.1);
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        button.action-btn {
            flex: 1;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            padding: 14px 20px;
            font-size: 14px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-start {
            background-color: var(--accent-color);
            color: #000000;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            padding: 14px 20px;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-submit {
            background-color: var(--accent-color);
            color: #000000;
        }

        .btn-skip {
            background-color: #2c2c2e;
            color: #e5e5ea;
            border: 1px solid #48484a;
        }
        
        .progress-bar {
            background-color: #2c2c2e;
            border-radius: 4px;
            height: 6px;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress-fill {
            background-color: var(--accent-color);
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }

        .indicator {
            text-align: right;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 15px;
        }

        .result-box {
            background: #1e1e24;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid var(--accent-color);
            margin-top: 20px;
            text-align: center;
        }

        .result-box h2 {
            margin-top: 0;
            font-size: 18px;
            text-transform: uppercase;
            color: var(--text-main);
        }

        .score-display {
            font-size: 48px;
            font-weight: 800;
            color: var(--accent-color);
            margin: 15px 0;
        }
        
        table.bilan {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 14px;
        }

        table.bilan th, table.bilan td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        table.bilan th {
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.5px;
        }

        .row-correct {
            color: var(--accent-color);
        }

        .row-incorrect {
            color: #ff453a;
        }

        .row-skipped {
            color: #e5e5ea;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>Fiche d'Automatismes 3ème</h1>
        <div class="subtitle">Sans calculatrice - Générateur aléatoire</div>
    </div>

    <!-- PANEL 1 : LOGIN -->
    <div id="panel-login" class="step-panel active">
        <div class="form-group">
            <label for="student-name">Nom et Prénom :</label>
            <input type="text" id="student-name" placeholder="Ex: Chloé Martin" autocomplete="off">
        </div>
        <button class="btn-start" onclick="startTest()">Démarrer la session</button>
    </div>

    <!-- PANEL 2 : PLAY -->
    <div id="panel-quiz" class="step-panel">
        <div class="indicator">Question <span id="current-q">1</span> / 5</div>
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
        
        <div class="consigne" id="q-consigne">Calcule sans utiliser de calculatrice :</div>
        
        <div class="question-box" id="q-box"></div>
        
        <div id="input-area" style="background-color: #1e1e24; padding: 20px; border-radius: 8px; border: 1px solid var(--border-color);">
            <div id="standard-answer-input">
                <label for="user-answer">Réponse :</label>
                <input type="text" id="user-answer" placeholder="Inscris ta réponse numérique" autocomplete="off">
            </div>

            <div id="qcm-answer-input" style="display: none;">
                <label>Choisis la bonne proposition :</label>
                <div class="options-grid" id="qcm-options"></div>
            </div>
            
            <div class="btn-group">
                <button class="action-btn btn-skip" onclick="skipQuestion()">Passer ⏭️</button>
                <button class="action-btn btn-submit" id="btn-validate" onclick="submitAnswer()">Valider</button>
            </div>
        </div>
    </div>

    <!-- PANEL 3 : RECAP -->
    <div id="panel-results" class="step-panel">
        <div class="result-box">
            <h2>Bilan d'Évaluation</h2>
            <p>Résultats de : <span id="res-name" style="font-weight: bold; color: #fff;">...</span></p>
            <div class="score-display" id="res-grade">0 / 5</div>
        </div>

        <h3 style="margin-top:30px; color: var(--text-main); font-size:15px; text-transform:uppercase; letter-spacing:0.5px; border-bottom:1px solid var(--border-color); padding-bottom:8px;">Correction détaillée</h3>
        <table class="bilan">
            <thead>
                <tr>
                    <th>Compétence</th>
                    <th>Énoncé</th>
                    <th>Ta réponse</th>
                    <th>Correction</th>
                </tr>
            </thead>
            <tbody id="bilan-table-body">
            </tbody>
        </table>

        <button class="btn-start" style="margin-top: 30px;" onclick="location.reload()">Nouvelle Série</button>
    </div>
</div>

<script>
    let quizQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let studentName = "";
    let selectedQcmValue = null;

    // Fonction utilitaire pour fabriquer une fraction propre en écriture réelle verticale
    function htmlFraction(num, den) {
        return `<span class="math-fraction"><span class="math-num">${num}</span><span class="math-den">${den}</span></span>`;
    }

    // Générateurs basés directement sur ton PDF :
    const generators = [
        // 1. Multiplication de décimaux (Exercices 1, 2, 3)
        function() {
            const types = [
                () => { // ex: 0,6 x 0,7
                    const a = (Math.floor(Math.random() * 8) + 2) / 10;
                    const b = (Math.floor(Math.random() * 8) + 2) / 10;
                    return { expr: `${a.toString().replace('.', ',')} × ${b.toString().replace('.', ',')}`, val: parseFloat((a * b).toFixed(2)) };
                },
                () => { // ex: 0,5 x 50 x 0,7
                    const factors = [0.5, 20, 0.6];
                    factors[1] = [10, 20, 30, 40, 50, 60][Math.floor(Math.random() * 6)];
                    factors[2] = (Math.floor(Math.random() * 8) + 2) / 10;
                    const prod = parseFloat((factors[0] * factors[1] * factors[2]).toFixed(2));
                    const label = `${factors[0].toString().replace('.', ',')} × ${factors[1]} × ${factors[2].toString().replace('.', ',')}`;
                    return { expr: label, val: prod };
                }
            ];
            const choice = types[Math.floor(Math.random() * types.length)]();
            return {
                type: "Multiplication décimale",
                isQcm: false,
                display: `<div class="math-line">${choice.expr}</div>`,
                answer: choice.val.toString().replace('.', ','),
                check: (u) => parseFloat(u.replace(',', '.')) === choice.val
            };
        },

        // 2. Écritures de fractions en décimales (Exercice 4)
        function() {
            const data = [
                { num: 3, den: 15, ans: 0.2 },
                { num: 140, den: 200, ans: 0.7 },
                { num: 6, den: 40, ans: 0.15 },
                { num: 6, den: 250, ans: 0.024 },
                { num: 12, den: 40, ans: 0.3 },
                { num: 9, den: 15, ans: 0.6 }
            ];
            const q = data[Math.floor(Math.random() * data.length)];
            return {
                type: "Fraction en décimal",
                isQcm: false,
                display: `Écris sous forme décimale la fraction : <br><div style="margin: 15px 0;">${htmlFraction(q.num, q.den)}</div>`,
                answer: q.ans.toString().replace('.', ','),
                check: (u) => parseFloat(u.replace(',', '.')) === q.ans
            };
        },

        // 3. Divisions de décimaux (Exercice 5)
        function() {
            const items = [
                { num: "0,7", den: "0,5", val: 1.4 },
                { num: "1,8", den: "2,5", val: 0.72 },
                { num: "4,2 × 0,8", den: "0,6", val: 5.6 },
                { num: "0,45", den: "0,6", val: 0.75 },
                { num: "2,4 × 0,3", den: "0,8", val: 0.9 }
            ];
            const q = items[Math.floor(Math.random() * items.length)];
            return {
                type: "Division de décimaux",
                isQcm: false,
                display: `Calcule le quotient : <br><div style="margin: 15px 0;">${htmlFraction(q.num, q.den)}</div>`,
                answer: q.val.toString().replace('.', ','),
                check: (u) => parseFloat(u.replace(',', '.')) === q.val
            };
        },

        // 4. Pourcentages (Exercices 6, 7, 8)
        function() {
            const types = [
                () => { // 50%, 10%, 25%, 75%
                    const rate = [10, 25, 50, 75][Math.floor(Math.random() * 4)];
                    const val = [40, 80, 120, 160, 200, 240][Math.floor(Math.random() * 6)];
                    const ans = (rate * val) / 100;
                    return { expr: `${rate}% de ${val}`, ans: ans };
                },
                () => { // 1%, 8%, 0.1%
                    const rate = [1, 5, 12, 15][Math.floor(Math.random() * 4)];
                    const val = [100, 200, 500, 1000, 1500][Math.floor(Math.random() * 5)];
                    const ans = (rate * val) / 100;
                    return { expr: `${rate}% de ${val}`, ans: ans };
                }
            ];
            const choice = types[Math.floor(Math.random() * types.length)]();
            return {
                type: "Calcul de pourcentage",
                isQcm: false,
                display: `<div class="math-line">${choice.expr}</div>`,
                answer: choice.ans.toString().replace('.', ','),
                check: (u) => parseFloat(u.replace(',', '.')) === choice.ans
            };
        },

        // 5. Hausses et baisses en pourcentage (Exercice 9)
        function() {
            const situations = [
                { item: "Un stylo", prix: 30, evolution: "augmente de 20%", final: 36 },
                { item: "Un sac", prix: 45, evolution: "baisse de 20%", final: 36 },
                { item: "Une montre", prix: 120, evolution: "baisse de 5%", final: 114 },
                { item: "Un bijou", prix: 1500, evolution: "augmente de 3%", final: 1545 },
                { item: "Un livre", prix: 80, evolution: "augmente de 15%", final: 92 },
                { item: "Un casque", prix: 60, evolution: "baisse de 10%", final: 54 }
            ];
            const q = situations[Math.floor(Math.random() * situations.length)];
            return {
                type: "Évolution en pourcentage",
                isQcm: false,
                display: `${q.item} coûte ${q.prix} €. Son prix ${q.evolution}.<br>Quel est son prix final ?`,
                answer: `${q.final} €`,
                check: (u) => {
                    const parsed = parseFloat(u.replace(/[^\d.,]/g, '').replace(',', '.'));
                    return parsed === q.final;
                }
            };
        },

        // 6. Évolutions successives (Exercice 10)
        function() {
            const data = [
                { txt: "une hausse de 20% puis une baisse de 10%", ansTxt: "Hausse de 8%", val: 8 },
                { txt: "une baisse de 10% puis une hausse de 20%", ansTxt: "Hausse de 8%", val: 8 },
                { txt: "une baisse de 20% puis une hausse de 20%", ansTxt: "Baisse de 4%", val: -4 },
                { txt: "deux baisses de 10%", ansTxt: "Baisse de 19%", val: -19 },
                { txt: "une hausse de 25% puis une baisse de 20%", ansTxt: "Évolution de 0% (stable)", val: 0 }
            ];
            const q = data[Math.floor(Math.random() * data.length)];
            return {
                type: "Évolutions successives",
                isQcm: false,
                display: `Détermine le taux global : <br><span style="font-size:0.8em; font-weight:normal;">${q.txt}</span>`,
                answer: q.ansTxt,
                check: (u) => {
                    const clean = u.toLowerCase();
                    if (q.val > 0) return clean.includes("hausse") && clean.includes(Math.abs(q.val).toString());
                    if (q.val < 0) return clean.includes("baisse") && clean.includes(Math.abs(q.val).toString());
                    return clean.includes("0") || clean.includes("stable");
                }
            };
        },

        // 7. Isoler une variable dans une formule (Exercices 11, 12)
        function() {
            const formulas = [
                {
                    formula: `<div class="math-line">V = ${htmlFraction('d', 't')}</div>`,
                    target: "Isoler d",
                    options: [
                        `d = V × t`, 
                        `d = ${htmlFraction('V', 't')}`, 
                        `d = ${htmlFraction('t', 'V')}`
                    ],
                    correctId: 0
                },
                {
                    formula: `<div class="math-line">V = ${htmlFraction('d', 't')}</div>`,
                    target: "Isoler t",
                    options: [
                        `t = ${htmlFraction('d', 'V')}`, 
                        `t = V × d`, 
                        `t = ${htmlFraction('V', 'd')}`
                    ],
                    correctId: 0
                },
                {
                    formula: `<div class="math-line">U = R × I</div>`,
                    target: "Isoler R",
                    options: [
                        `R = ${htmlFraction('U', 'I')}`, 
                        `R = U × I`, 
                        `R = ${htmlFraction('I', 'U')}`
                    ],
                    correctId: 0
                },
                {
                    formula: `<div class="math-line">E = ${htmlFraction('1', '2')} × m × V<sup>2</sup></div>`,
                    target: "Isoler m",
                    options: [
                        `m = ${htmlFraction('2 × E', 'V<sup>2</sup>')}`, 
                        `m = ${htmlFraction('E', '2 × V<sup>2</sup>')}`, 
                        `m = 2 × E × V<sup>2</sup>`
                    ],
                    correctId: 0
                }
            ];
            const q = formulas[Math.floor(Math.random() * formulas.length)];
            return {
                type: "Isoler une variable",
                isQcm: true,
                display: `On considère la formule suivante : <br><div style="margin:15px 0; color:var(--accent-color);">${q.formula}</div>Comment exprime-t-on la variable si on veut <b>${q.target}</b> ?`,
                options: q.options,
                answer: q.options[q.correctId],
                check: (u) => u === q.options[q.correctId]
            };
        }
    ];

    function buildQuiz() {
        quizQuestions = [];
        const shuffled = [...generators].sort(() => 0.5 - Math.random());
        for (let i = 0; i < 5; i++) {
            quizQuestions.push(shuffled[i]());
        }
    }

    function startTest() {
        const nameInput = document.getElementById("student-name").value.trim();
        if (nameInput === "") {
            alert("Veuillez inscrire ton nom avant de commencer !");
            return;
        }
        studentName = nameInput;
        buildQuiz();
        showPanel("panel-quiz");
        loadQuestion();
    }

    function showPanel(panelId) {
        document.querySelectorAll('.step-panel').forEach(p => p.classList.remove('active'));
        document.getElementById(panelId).classList.add('active');
    }

    function loadQuestion() {
        if (currentIndex >= 5) {
            endTest();
            return;
        }

        const q = quizQuestions[currentIndex];
        document.getElementById("current-q").innerText = currentIndex + 1;
        document.getElementById("q-box").innerHTML = q.display;

        if (q.isQcm) {
            document.getElementById("standard-answer-input").style.display = "none";
            document.getElementById("qcm-answer-input").style.display = "block";
            
            const optionsDiv = document.getElementById("qcm-options");
            optionsDiv.innerHTML = "";
            selectedQcmValue = null;
            
            q.options.forEach(opt => {
                const btn = document.createElement("button");
                btn.className = "option-button";
                btn.innerHTML = opt; 
                btn.onclick = () => {
                    document.querySelectorAll('.option-button').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    selectedQcmValue = opt;
                };
                optionsDiv.appendChild(btn);
            });
        } else {
            document.getElementById("standard-answer-input").style.display = "block";
            document.getElementById("qcm-answer-input").style.display = "none";
            document.getElementById("user-answer").value = "";
            document.getElementById("user-answer").focus();
        }

        const progress = (currentIndex / 5) * 100;
        document.getElementById("progress-fill").style.width = progress + "%";
    }

    function submitAnswer() {
        const q = quizQuestions[currentIndex];
        let userAnswer = "";

        if (q.isQcm) {
            if (!selectedQcmValue) {
                alert("Sélectionne l'une des propositions !");
                return;
            }
            userAnswer = selectedQcmValue;
        } else {
            userAnswer = document.getElementById("user-answer").value.trim();
            if (userAnswer === "") {
                alert("Rédige ta réponse avant de valider.");
                return;
            }
        }

        q.savedAns = userAnswer;
        const isCorrect = q.check(userAnswer);

        if (isCorrect) {
            score++;
            q.status = "correct";
        } else {
            q.status = "incorrect";
        }

        currentIndex++;
        loadQuestion();
    }

    function skipQuestion() {
        const q = quizQuestions[currentIndex];
        q.status = "skipped";
        q.savedAns = "Passé ⏭️";
        currentIndex++;
        loadQuestion();
    }

    function endTest() {
        showPanel("panel-results");
        document.getElementById("res-name").innerText = studentName;
        document.getElementById("res-grade").innerText = `${score} / 5`;
        
        if (score >= 4) document.getElementById("res-grade").style.color = "var(--accent-color)";
        else if (score >= 2.5) document.getElementById("res-grade").style.color = "#ff9500";
        else document.getElementById("res-grade").style.color = "#ff453a";

        const tableBody = document.getElementById("bilan-table-body");
        tableBody.innerHTML = ""; 

        quizQuestions.forEach(q => {
            const row = document.createElement("tr");
            let rowClass = "row-incorrect";
            let correctionBadge = `<div class="math-line" style="color: #ff453a; font-weight:bold;">${q.answer}</div>`;

            if (q.status === "correct") {
                rowClass = "row-correct";
                correctionBadge = `<span style="color: var(--accent-color); font-weight:bold;">Correct ✅</span>`;
            } else if (q.status === "skipped") {
                rowClass = "row-skipped";
                correctionBadge = `<div class="math-line" style="color: var(--text-muted); font-weight:bold;">${q.answer}</div>`;
            }

            row.className = rowClass;
            row.innerHTML = `
                <td><strong>${q.type}</strong></td>
                <td style="font-size: 0.95em;">${q.display}</td>
                <td><div class="math-line">${q.savedAns}</div></td>
                <td>${correctionBadge}</td>
            `;
            tableBody.appendChild(row);
        });
    }

    document.getElementById("user-answer").addEventListener("keyup", function(event) {
        if (event.key === "Enter") submitAnswer();
    });
</script>
</body>
</html>
